<!-- base.html -->
<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">



</head>
<body>

<div class="d-flex">
    <!-- Menú lateral -->
    <div class="sidebar p-3">
        <h3 class="text-center">Freshstart</h3>
        <div class="accordion" id="accordionExample">
            <div class="card bg-dark">
                <div class="card-header p-0">
                    <button class="accordion-button collapsed" type="button" data-toggle="collapse" data-target="#collapseOne">
                       Internos
                    </button>
                </div>

             <div id="collapseOne" class="collapse" data-parent="#accordionExample">
                    <div class="accordion-body">
                        <a href="{% url 'listaint' %}" class="nav-link">Listado</a>
                        <a href="" class="nav-link">Registro de salidas</a>
                    </div>
             </div>
            </div>

            <div class="card bg-dark">
                <div class="card-header p-0">
                    <button class="accordion-button collapsed" type="button" data-toggle="collapse" data-target="#collapseTwo">
                        Consejeria
                    </button>
                </div>
                <div id="collapseTwo" class="collapse" data-parent="#accordionExample">
                    <div class="accordion-body">
                        <a href="" class="nav-link">Psicosis</a>
                        <a href="" class="nav-link">Ansiedad</a>
                    </div>
                </div>

            </div>
            <div class="card bg-dark">
                <div class="card-header p-0">
                    <button class="accordion-button collapsed" type="button" data-toggle="collapse" data-target="#collapseThree">
                        Utilidades
                    </button>
                </div>
                <div id="collapseThree" class="collapse" data-parent="#accordionExample">
                    <div class="accordion-body">
                        <a href="{% url 'datosgrales' %}" class="nav-link">Datos de la clinica</a>
                        <a href="{%url 'lusuarios' %}" class="nav-link">Tabla de usuarios</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <br>
    <!-- Contenido principal -->
    <div class="container" style="margin-left:400px;width:800px;color: #0597f9;background-color: #f3f8f7;border:2px solid grey;border-radius:8px;" >

        {% block content %}

        <!-- Este bloque será reemplazado por el contenido específico de cada vista -->
        {% endblock %}
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
