<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">

</head>
<body>

<div class="d-flex">
    <!-- Menú lateral -->
    <div class="sidebar p-3">
        <h3 class="text-center">Freshstart</h3>
        <div class="accordion" id="acordeon" data-bs-parent="#acordeon">

            <div class="card bg-dark">
                 <a href="{%url 'listaint' %}" class="accordion-button collapsed" type="button">Internos</a>
            </div>

            <div class="card bg-dark">
                <div class="card-header p-0">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSix">
                        Administracion
                    </button>
                </div>
                <div id="collapseSix" class="collapse" data-parent="#acordeon"  data-bs-parent="#acordeon">
                    <div class="accordion-body">
                        <a href="{% url 'datosgrales' %}" class="nav-link">Reportes</a>
                        <a href="{%url 'lusuarios' %}" class="nav-link">Captura de cuotas voluntarias</a>
                        <a href="{% url 'datosgrales' %}" class="nav-link">Estados de cuenta</a>
                        <a href="{%url 'lusuarios' %}" class="nav-link">Captura otros cargos y/o abonos</a>

                    </div>
                </div>
            </div>



            <div class="card bg-dark">
                <div class="card-header p-0">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSeven">
                        Utilidades
                    </button>
                </div>
                <div id="collapseSeven" class="collapse" data-parent="#accordionExample">
                    <div class="accordion-body">
                        <a href="{% url 'datosgrales' %}" class="nav-link">Datos de la clinica</a>
                        <a href="{%url 'lusuarios' %}" class="nav-link">Tabla de usuarios</a>
                        <a href="{% url 'datosgrales' %}" class="nav-link">Tabla de conceptos</a>
                        <a href="{%url 'lusuarios' %}" class="nav-link">Tabla estados y paises</a>

                    </div>
                </div>
                </div>

        </div>
    </div>
</div>
    <br>
    <!-- Contenido principal -->
    <div class="container" style="margin-left:400px;width:800px;color: #0597f9;background-color: #f3f8f7;border:2px solid grey;border-radius:8px;" >

        {% block content %}

        <!-- Este bloque será reemplazado por el contenido específico de cada vista -->
        {% endblock %}
    </div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>

</body>
</html>
